<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- 背景 -->
  <rect width="256" height="256" fill="#2c2c2c" rx="32"/>
  
  <!-- 外边框 -->
  <rect x="8" y="8" width="240" height="240" fill="none" stroke="#4a4a4a" stroke-width="8" rx="28"/>
  
  <!-- 骷髅头部轮廓 -->
  <g transform="translate(128, 128)">
    <!-- 头部主体 -->
    <ellipse cx="0" cy="-10" rx="70" ry="65" fill="#e8e8e8"/>
    
    <!-- 左眼眶 -->
    <rect x="-45" y="-35" width="35" height="40" fill="#1a1a1a" rx="4"/>
    <!-- 左眼眶高光 -->
    <rect x="-42" y="-32" width="8" height="8" fill="#3a3a3a"/>
    
    <!-- 右眼眶 -->
    <rect x="10" y="-35" width="35" height="40" fill="#1a1a1a" rx="4"/>
    <!-- 右眼眶高光 -->
    <rect x="13" y="-32" width="8" height="8" fill="#3a3a3a"/>
    
    <!-- 鼻子 -->
    <polygon points="0,5 -15,35 15,35" fill="#1a1a1a"/>
    
    <!-- 牙齿 -->
    <rect x="-40" y="45" width="80" height="25" fill="#e8e8e8" rx="2"/>
    <line x1="-30" y1="45" x2="-30" y2="70" stroke="#c0c0c0" stroke-width="2"/>
    <line x1="-10" y1="45" x2="-10" y2="70" stroke="#c0c0c0" stroke-width="2"/>
    <line x1="10" y1="45" x2="10" y2="70" stroke="#c0c0c0" stroke-width="2"/>
    <line x1="30" y1="45" x2="30" y2="70" stroke="#c0c0c0" stroke-width="2"/>
    
    <!-- 额头装饰 -->
    <rect x="-50" y="-70" width="100" height="15" fill="#d0d0d0" rx="3"/>
  </g>
  
  <!-- 死亡标记 - 红色叉号 -->
  <g transform="translate(200, 56)">
    <circle cx="0" cy="0" r="28" fill="#ff4444"/>
    <line x1="-12" y1="-12" x2="12" y2="12" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    <line x1="12" y1="-12" x2="-12" y2="12" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  </g>
  
  <!-- 底部文字背景 -->
  <rect x="20" y="190" width="216" height="46" fill="#1a1a1a" rx="8"/>
  
  <!-- 插件名称 -->
  <text x="128" y="222" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">YiyunSuicide</text>
</svg>
